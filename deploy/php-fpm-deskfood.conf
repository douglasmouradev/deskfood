; Pool PHP-FPM dedicado ao Desk Food
; Ubuntu/Debian: /etc/php/8.3/fpm/pool.d/deskfood.conf
; Depois: sudo systemctl restart php8.3-fpm

[deskfood]
user = www-data
group = www-data

listen = /run/php/php8.3-fpm-deskfood.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8

php_admin_value[error_log] = /var/log/php/deskfood-error.log
php_admin_flag[log_errors] = on

; Ajuste o caminho do projeto
env[APP_ENV] = production
