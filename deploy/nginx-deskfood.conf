# Nginx — Desk Food (docroot = public/)
# Copie para /etc/nginx/sites-available/deskfood e ative:
#   sudo ln -s /etc/nginx/sites-available/deskfood /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name deskfood.seudominio.com.br;

    # Redirecione para HTTPS após certificado (certbot)
    # return 301 https://$host$request_uri;

    root /var/www/deskfood/public;
    index index.php;

    client_max_body_size 4M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm-deskfood.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(env|git) {
        deny all;
    }

    location ~ ^/(install\.php|composer\.(json|lock))$ {
        deny all;
    }

    location ^~ /storage/ {
        deny all;
    }
}

