services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: desk_food
    ports:
      - "3306:3306"
    volumes:
      - deskfood_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      APP_URL: http://localhost:8080
      APP_SECRET: docker_dev_secret_32_chars_minimum_ok
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: desk_food
      DB_USERNAME: root
      DB_PASSWORD: root
      SMS_PROVIDER: log
      PIX_WEBHOOK_SECRET: docker_webhook_secret
    depends_on:
      mysql:
        condition: service_healthy
    command: php -S 0.0.0.0:8080 -t public public/router.php

volumes:
  deskfood_mysql:
